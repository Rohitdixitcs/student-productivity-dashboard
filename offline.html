<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline • Student Productivity Dashboard Pro</title>
    <style>
      body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0b1020;color:#e8edf8;font-family:Inter,sans-serif;padding:16px}
      .card{max-width:520px;padding:24px;border-radius:16px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.06);text-align:center}
      button{margin-top:12px;padding:10px 14px;border:none;border-radius:10px;background:#6d8dff;color:#fff;cursor:pointer}
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're offline</h1>
      <p>Student Productivity Dashboard Pro is still available with cached data. Reconnect to sync latest updates.</p>
      <button onclick="location.reload()">Try Again</button>
    </div>
  </body>
</html>
